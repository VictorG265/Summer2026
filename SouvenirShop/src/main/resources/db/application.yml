spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/souvenir_shop
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate        # Flyway управляет схемой, Hibernate только проверяет
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: 8080

jwt:
  secret: your-very-long-secret-key-which-should-be-at-least-256-bits-long
  expiration: 86400000    # 24 часа в миллисекундах